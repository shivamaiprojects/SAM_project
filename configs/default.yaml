project:
  name: sam3-surgical-video-segmentation
  seed: 42

paths:
  raw_data: data/raw/cholecseg8k
  processed_data: data/processed
  outputs: outputs
  checkpoints: checkpoints

data:
  clip_length: 80
  frame_height: 480
  frame_width: 854
  fps: 10
  demo_clip: video01/video01_00400

model:
  image_version: sam3
  video_version: sam3.1
  device: cuda
  use_fa3: false

inference:
  score_threshold: 0.5
  max_num_objects: 16


prompts:
  grasper: "tool"
  l_hook_electrocautery: "tool"

prompt_candidates:
  grasper: ["tool", "forceps", "surgical instrument", "surgical tool", "grasper"]
  l_hook_electrocautery: ["tool", "hook", "electrocautery hook", "surgical instrument", "l-hook electrocautery"]

inference:
  score_threshold: 0.3
  max_num_objects: 16

evaluation:
  metrics: [iou, dice, precision, recall]